name: Backend CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath, intl, gd
          coverage: none

      - name: Install dependencies on host
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=mysql/g' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=sail/g' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=password/g' .env
          sed -i 's/REDIS_HOST=127.0.0.1/REDIS_HOST=redis/g' .env

      - name: Start Docker services
        run: docker compose up -d --build

      - name: Wait for MySQL
        run: |
          until docker compose exec -T mysql mysqladmin ping -ppassword --silent; do
            sleep 2
          done

      - name: Generate application key
        run: docker compose exec -T laravel.test php artisan key:generate

      - name: Check code style
        run: docker compose exec -T laravel.test ./vendor/bin/pint --test

      - name: Run migrations
        run: docker compose exec -T laravel.test php artisan migrate:fresh --force

      - name: Run tests
        run: docker compose exec -T laravel.test php artisan test

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
