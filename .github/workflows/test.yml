name: Backend CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath, intl, gd
          coverage: none

      - name: Install dependencies on host
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=mysql/g' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=sail/g' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=password/g' .env
          sed -i 's/REDIS_HOST=127.0.0.1/REDIS_HOST=redis/g' .env

      - name: Start Docker services
        run: docker compose up -d --build

      - name: Wait for MySQL
        run: |
          until docker compose exec -T mysql mysqladmin ping -ppassword --silent; do
            sleep 2
          done

      - name: Wait for application database connection
        run: |
          docker compose exec -T laravel.test php -r '
            for ($i = 0; $i < 30; $i++) {
              try {
                new PDO("mysql:host=mysql;port=3306;dbname=doctorbookingapi", "sail", "password");
                exit(0);
              } catch (Throwable $e) {
                sleep(2);
              }
            }

            exit(1);
          '

      - name: Generate application key
        run: docker compose exec -T laravel.test php artisan key:generate

      - name: Check code style
        run: docker compose exec -T laravel.test ./vendor/bin/pint --test

      - name: Run migrations
        run: docker compose exec -T laravel.test php artisan migrate:fresh --force

      - name: Run tests
        run: docker compose exec -T laravel.test php artisan test

      - name: Stop Docker services
        if: always()
        run: docker compose down -v

  merge-dev-into-main:
    needs: backend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && needs.backend-tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge dev into main
        run: |
          git config --global user.name "MohammedTaha187"
          git config --global user.email "MohammedTaha187@users.noreply.github.com"
          git fetch origin main dev
          git checkout main
          git merge origin/dev --no-ff -m "Auto-merge dev into main after successful CI"
          git push origin main
