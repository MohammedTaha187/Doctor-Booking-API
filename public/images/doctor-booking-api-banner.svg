<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Doctor Booking API preview</title>
  <desc id="desc">A landing banner for the Doctor Booking API project with dashboard-style cards.</desc>
  <defs>
    <linearGradient id="bg" x1="200" y1="80" x2="1480" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#123A4F"/>
      <stop offset="1" stop-color="#1B5B57"/>
    </linearGradient>
    <linearGradient id="card" x1="320" y1="180" x2="1220" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.16"/>
      <stop offset="1" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="260" cy="150" r="180" fill="#38BDF8" fill-opacity="0.12"/>
  <circle cx="1390" cy="210" r="240" fill="#22C55E" fill-opacity="0.10"/>
  <circle cx="1310" cy="760" r="220" fill="#A855F7" fill-opacity="0.10"/>
  <path d="M0 680C190 600 280 520 470 500C720 474 820 610 1050 600C1260 592 1370 520 1600 440V900H0V680Z" fill="#0B1220" fill-opacity="0.55"/>

  <g filter="url(#shadow)">
    <rect x="130" y="120" width="1340" height="660" rx="40" fill="url(#card)" stroke="white" stroke-opacity="0.16"/>
  </g>

  <g>
    <rect x="190" y="180" width="360" height="82" rx="24" fill="white" fill-opacity="0.12"/>
    <rect x="208" y="202" width="38" height="38" rx="12" fill="url(#accent)"/>
    <path d="M219 221H235M227 213V229" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="260" y="220" fill="white" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Doctor Booking API</text>
    <text x="260" y="246" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="16">Laravel 13 • API v1 • Spatie Roles • MySQL</text>
  </g>

  <g>
    <rect x="190" y="300" width="560" height="440" rx="32" fill="#08111F" fill-opacity="0.65" stroke="white" stroke-opacity="0.10"/>
    <text x="230" y="350" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Project areas</text>
    <text x="230" y="382" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="16">Auth, doctors, appointments, payments, reviews, localization.</text>

    <rect x="230" y="420" width="220" height="120" rx="24" fill="#0F172A" stroke="white" stroke-opacity="0.08"/>
    <text x="260" y="462" fill="white" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Patients</text>
    <text x="260" y="492" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Browse doctors</text>
    <text x="260" y="516" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Book appointments</text>

    <rect x="470" y="420" width="220" height="120" rx="24" fill="#0F172A" stroke="white" stroke-opacity="0.08"/>
    <text x="500" y="462" fill="white" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Doctors</text>
    <text x="500" y="492" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Schedules</text>
    <text x="500" y="516" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Reviews & availability</text>

    <rect x="230" y="568" width="220" height="120" rx="24" fill="#0F172A" stroke="white" stroke-opacity="0.08"/>
    <text x="260" y="610" fill="white" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Payments</text>
    <text x="260" y="640" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Paymob / Stripe / PayPal</text>
    <text x="260" y="664" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Status tracking</text>

    <rect x="470" y="568" width="220" height="120" rx="24" fill="#0F172A" stroke="white" stroke-opacity="0.08"/>
    <text x="500" y="610" fill="white" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Admin</text>
    <text x="500" y="640" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Settings & specialties</text>
    <text x="500" y="664" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Roles & permissions</text>
  </g>

  <g>
    <rect x="810" y="300" width="580" height="440" rx="32" fill="#07101C" fill-opacity="0.74" stroke="white" stroke-opacity="0.10"/>
    <text x="850" y="350" fill="white" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Stack</text>
    <g font-family="Inter, Arial, sans-serif" font-size="18" fill="#E2E8F0">
      <rect x="850" y="390" width="160" height="52" rx="18" fill="#1E293B"/>
      <text x="890" y="423">PHP 8.4</text>

      <rect x="1025" y="390" width="170" height="52" rx="18" fill="#1E293B"/>
      <text x="1058" y="423">Laravel 13</text>

      <rect x="1210" y="390" width="140" height="52" rx="18" fill="#1E293B"/>
      <text x="1248" y="423">Vite</text>

      <rect x="850" y="460" width="180" height="52" rx="18" fill="#1E293B"/>
      <text x="878" y="493">MySQL</text>

      <rect x="1045" y="460" width="165" height="52" rx="18" fill="#1E293B"/>
      <text x="1073" y="493">Spatie Roles</text>

      <rect x="1225" y="460" width="125" height="52" rx="18" fill="#1E293B"/>
      <text x="1255" y="493">API</text>
    </g>

    <rect x="850" y="548" width="500" height="122" rx="28" fill="url(#accent)" fill-opacity="0.22" stroke="white" stroke-opacity="0.10"/>
    <text x="886" y="594" fill="white" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Organized API structure</text>
    <text x="886" y="626" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16">Controllers, Requests, Repositories, Services, Jobs, Events.</text>
    <text x="886" y="652" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16">Ready for v1 expansion and cleaner maintenance.</text>
  </g>
</svg>
